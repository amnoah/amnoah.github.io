<!doctype html>
<html lang="en">

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>Genesee County Healthcare Map</title>

    <!-- Load general CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Bootstrap core CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1/dist/css/bootstrap.min.css" rel="stylesheet"  crossorigin="anonymous">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.6.0/dist/leaflet.css" />
  </head>
  <body>

    <nav class="navbar navbar-expand-sm navbar-dark bg-dark" aria-label="Third navbar example">
      <div class="container-fluid">
        <a href="#" class="navbar-brand d-flex align-items-center">
          <strong>Noah Lutz's Genesee County Healthcare Map</strong>
        </a>
      </div>
    </nav>

<main>

  <section class="py-5 container">
    <div class="row py-lg-1">
        <div id="map"></div>
    </div>


    <div class="row py-lg-4">
      <div class="col-lg-6 col-md-8">

        <h3>Selected year: <span id="demo"></span></h3>
        <div class="slidecontainer">
          <input type="range" min="1840" max="2025" value="1840" class="slider" id="myRange">
        </div>

          <h3> </h3>

          <label class="cbox">
              Active Facilities
              <input type="checkbox" id="activeC" checked="checked">
              <span class="checkmark active"></span>
          </label>

          <label class="cbox">
               Inactive Facilities (Closed)
              <input type="checkbox" id="closedC" checked="checked">
              <span class="checkmark closed"></span>
          </label>

          <label class="cbox">
               Inactive Facilities (Moved)
              <input type="checkbox" id="movedC" checked="checked">
              <span class="checkmark moved"></span>
          </label>

          <label class="cbox">
               Proposed Facilities
              <input type="checkbox" id="proposedC" checked="checked">
              <span class="checkmark proposed"></span>
          </label>
      </div>
    </div>
  </section>

</main>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1/dist/js/bootstrap.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.6.0/dist/leaflet.js"></script>
    <script src="facilities.js"></script>
    <script src="map.js"></script>
  </body>
</html>
